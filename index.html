<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Khan ❤️ Fiza</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#3b2233;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.chat{
width:380px;
height:700px;
background:#2d1b28;
border-radius:25px;
overflow:hidden;
display:flex;
flex-direction:column;
box-shadow:0 0 20px rgba(0,0,0,.4);
}

.header{
background:#ff4da6;
padding:15px;
text-align:center;
color:white;
font-size:22px;
font-weight:bold;
}

.online{
font-size:12px;
margin-top:5px;
}

#box{
flex:1;
overflow-y:auto;
padding:15px;
}

.left{
background:#444;
color:white;
padding:12px;
border-radius:15px;
max-width:70%;
margin-bottom:10px;
}

.right{
background:#ff4da6;
color:white;
padding:12px;
border-radius:15px;
max-width:70%;
margin-left:auto;
margin-bottom:10px;
}

.time{
font-size:10px;
opacity:.7;
margin-top:5px;
}

.bottom{
display:flex;
padding:10px;
background:#24151f;
}

#msg{
flex:1;
padding:12px;
border:none;
border-radius:25px;
outline:none;
}

button{
margin-left:10px;
padding:12px 20px;
border:none;
border-radius:25px;
background:#ff4da6;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div class="chat">

<div class="header">
Khan ❤️ Fiza
<div class="online">💚 Connected</div>
</div>

<div id="box">

<div class="left">
Hello meri jaan ❤️
<div class="time">10:20 PM</div>
</div>

<div class="right">
Hello Khan 😘
<div class="time">10:21 PM</div>
</div>

</div>

<div class="bottom">
<input id="msg" placeholder="Write something sweet...">
<button onclick="send()">Send</button>
</div>

</div>

<script>
function send(){

let input=document.getElementById("msg");
let text=input.value;

if(text=="") return;

let div=document.createElement("div");

div.className="right";

let time=new Date().toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
});

div.innerHTML=text+
'<div class="time">'+time+'</div>';

document.getElementById("box").appendChild(div);

input.value="";

document.getElementById("box").scrollTop=
document.getElementById("box").scrollHeight;
}
</script>

</body>
</html>
