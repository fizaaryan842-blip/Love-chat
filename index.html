<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Chat</title>

<style>
body{
background:black;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

#loginBox,#chatBox{
max-width:500px;
margin:auto;
background:#111;
padding:20px;
border:2px solid red;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
background:#222;
color:white;
border:1px solid red;
}

button{
width:100%;
padding:10px;
background:red;
color:white;
border:none;
cursor:pointer;
}

#messages{
height:300px;
overflow-y:auto;
border:1px solid red;
padding:10px;
margin-bottom:10px;
}

.msg{
background:#222;
padding:8px;
margin:5px 0;
border-radius:8px;
}
</style>
</head>
<body>

<div id="loginBox">
<h2>Love Chat</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<div id="chatBox" style="display:none">
<h2>Private Chat</h2>

<div id="messages"></div>

<input id="messageInput" placeholder="Type message">

<button onclick="sendMessage()">Send</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";

import { getAuth, signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
query,
orderBy,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBKy95iM9GDZe8Jix71dxQICqY4GF1O2Lg",
authDomain: "love-chat-b86f5.firebaseapp.com",
projectId: "love-chat-b86f5",
storageBucket: "love-chat-b86f5.firebasestorage.app",
messagingSenderId: "110257344850",
appId: "1:110257344850:web:1551dfc1a69fd3665a2a8b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser="";

window.login = async function(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

try{

await signInWithEmailAndPassword(auth,email,password);

currentUser=email;

document.getElementById("loginBox").style.display="none";
document.getElementById("chatBox").style.display="block";

loadMessages();

}catch(e){

alert(e.message);

}

}

window.sendMessage = async function(){

const text=document.getElementById("messageInput").value;

if(text==="") return;

await addDoc(collection(db,"messages"),{
user:currentUser,
text:text,
time:Date.now()
});

document.getElementById("messageInput").value="";
}

function loadMessages(){

const q=query(
collection(db,"messages"),
orderBy("time")
);

onSnapshot(q,(snapshot)=>{

const box=document.getElementById("messages");

box.innerHTML="";

snapshot.forEach((doc)=>{

const data=doc.data();

box.innerHTML += `
<div class="msg">
<b>${data.user}</b><br>
${data.text}
</div>
`;

});

});

}

</script>

</body>
</html>
