<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Love Chat</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }

    #box {
      height: 400px;
      border: 1px solid #ccc;
      overflow-y: auto;
      padding: 10px;
      margin-bottom: 10px;
    }

    .msg {
      padding: 8px;
      margin: 5px 0;
      background: #f1f1f1;
      border-radius: 8px;
    }

    input {
      width: 75%;
      padding: 10px;
    }

    button {
      padding: 10px;
    }
  </style>
</head>

<body>

<h2>Love Chat ❤️</h2>

<div id="box"></div>

<input id="msg" placeholder="Type message...">
<button onclick="send()">Send</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBKy95iM9GDZe8Jix71dxQICqY4GF1O2Lg",
  authDomain: "love-chat-b86f5.firebaseapp.com",
  projectId: "love-chat-b86f5",
  storageBucket: "love-chat-b86f5.firebasestorage.app",
  messagingSenderId: "110257344850",
  appId: "1:110257344850:web:1551dfc1a69fd3665a2a8b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.send = async function () {
  let input = document.getElementById("msg");
  let text = input.value.trim();

  if (!text) return;

  await addDoc(collection(db, "messages"), {
    text: text,
    time: Date.now()
  });

  input.value = "";
};

const q = query(collection(db, "messages"), orderBy("time"));

onSnapshot(q, (snapshot) => {
  let box = document.getElementById("box");
  box.innerHTML = "";

  snapshot.forEach((doc) => {
    let div = document.createElement("div");
    div.className = "msg";
    div.innerText = doc.data().text;
    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
});
</script>

</body>
</html>
