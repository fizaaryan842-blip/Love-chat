<script type="module">

  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBKy95iM9GDZe8Jix71dxQICqY4GF1O2Lg",
  authDomain: "love-chat-b86f5.firebaseapp.com",
  projectId: "love-chat-b86f5",
  storageBucket: "love-chat-b86f5.firebasestorage.app",

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
p
window.send = async function () {
  let input = document.getElementById("msg");
  let text = input.value.trim();

  if (!text) return;

  await addDoc(collection(db, "messages"), {
    text: text,
    time: Date.now()
  });

  input.value = "";
};

const q = query(collection(db, "messages"), orderBy("time"));

onSnapshot(q, (snapshot) => {
  let box = document.getElementById("box");
  box.innerHTML = "";

  snapshot.forEach((doc) => {
    let div = document.createElement("div");
    div.className = "msg a";
    div.innerText = doc.data().text;
    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
});

window.clearChat = function () {
  alert("Clear chat disabled");
};
</script>
